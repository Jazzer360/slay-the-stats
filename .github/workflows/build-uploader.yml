name: Build Desktop Uploader

on:
  push:
    branches: [main]
    paths:
      - 'uploader/client/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: uploader/client

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: uploader/client/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python -m PyInstaller watcher.spec --noconfirm

      - name: Generate version tag
        id: version
        shell: bash
        run: echo "tag=uploader-v$(date +%Y%m%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Desktop Uploader ${{ steps.version.outputs.tag }}
          body: |
            Automated build of SlayTheStatsUploader.exe from commit ${{ github.sha }}.
          files: uploader/client/dist/SlayTheStatsUploader.exe
          draft: false
          prerelease: false
